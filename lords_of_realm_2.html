<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lords of the Realm II - Infinite Progression</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #2c1810 0%, #4a2c2a 100%);
            color: #f4e4d0;
            min-height: 100vh;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #8b7355;
        }

        .header h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 24px;
            background: rgba(139, 115, 85, 0.6);
            border: 2px solid #8b7355;
            color: #f4e4d0;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-button:hover {
            background: rgba(139, 115, 85, 0.8);
        }

        .tab-button.active {
            background: #8b7355;
            color: #ffd700;
        }

        .sub-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            padding-left: 20px;
        }

        .sub-tab-button {
            padding: 8px 16px;
            background: rgba(100, 80, 60, 0.6);
            border: 1px solid #6b5344;
            color: #e4d4c0;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .sub-tab-button:hover {
            background: rgba(100, 80, 60, 0.8);
        }

        .sub-tab-button.active {
            background: #6b5344;
            color: #ffd700;
        }

        .content {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #8b7355;
            min-height: 500px;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .resource-card {
            background: rgba(139, 115, 85, 0.3);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #8b7355;
        }

        .resource-name {
            font-size: 1.1em;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .resource-amount {
            font-size: 1.5em;
            font-weight: bold;
        }

        .resource-rate {
            font-size: 0.9em;
            color: #aaa;
        }

        .btn {
            padding: 10px 20px;
            background: #8b7355;
            border: none;
            color: #f4e4d0;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #a08260;
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            transition: width 0.3s;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 24, 16, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            z-index: 1000;
            max-width: 500px;
            text-align: center;
        }

        .popup h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .popup-content {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .army-unit {
            display: inline-block;
            margin: 5px;
            padding: 10px;
            background: rgba(139, 115, 85, 0.4);
            border-radius: 5px;
            border: 1px solid #8b7355;
        }

        .combat-log {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .log-entry {
            padding: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neural-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(139, 115, 85, 0.3);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .world-info {
            background: rgba(139, 115, 85, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Number formatting with suffixes for unlimited progression
        const numberSuffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc', 'UDc', 'DDc', 'TDc', 'QaDc', 'QiDc', 'SxDc', 'SpDc', 'ODc', 'NDc', 'Vg', 'UVg', 'DVg', 'TVg', 'QaVg', 'QiVg', 'SxVg', 'SpVg', 'OVg', 'NVg', 'Tg', 'UTg', 'DTg', 'TTg', 'QaTg', 'QiTg', 'SxTg', 'SpTg', 'OTg', 'NTg', 'Qd', 'UQd', 'DQd', 'TQd', 'QaQd', 'QiQd', 'SxQd', 'SpQd', 'OQd', 'NQd', 'Qt', 'UQt', 'DQt', 'TQt', 'QaQt', 'QiQt', 'SxQt', 'SpQt', 'OQt', 'NQt'];

        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            const tier = Math.floor(Math.log10(num) / 3);
            if (tier >= numberSuffixes.length) {
                return num.toExponential(2);
            }
            const suffix = numberSuffixes[tier];
            const scaled = num / Math.pow(10, tier * 3);
            return scaled.toFixed(2) + suffix;
        }

        function parseNumber(str) {
            // For internal use, we always store as regular numbers
            return parseFloat(str) || 0;
        }

        // Neural Network Class
        class NeuralNetwork {
            constructor(inputSize, hiddenSize, outputSize) {
                this.inputSize = inputSize;
                this.hiddenSize = hiddenSize;
                this.outputSize = outputSize;
                
                // Initialize weights randomly
                this.weights1 = Array(hiddenSize).fill().map(() => 
                    Array(inputSize).fill().map(() => Math.random() * 2 - 1)
                );
                this.weights2 = Array(outputSize).fill().map(() => 
                    Array(hiddenSize).fill().map(() => Math.random() * 2 - 1)
                );
                this.bias1 = Array(hiddenSize).fill().map(() => Math.random() * 2 - 1);
                this.bias2 = Array(outputSize).fill().map(() => Math.random() * 2 - 1);
                
                this.fitness = 0;
                this.generation = 1;
                this.bestFitness = 0;
            }

            relu(x) {
                return Math.max(0, x);
            }

            forward(input) {
                // Hidden layer
                const hidden = Array(this.hiddenSize).fill(0);
                for (let i = 0; i < this.hiddenSize; i++) {
                    for (let j = 0; j < this.inputSize; j++) {
                        hidden[i] += this.weights1[i][j] * input[j];
                    }
                    hidden[i] += this.bias1[i];
                    hidden[i] = this.relu(hidden[i]);
                }

                // Output layer
                const output = Array(this.outputSize).fill(0);
                for (let i = 0; i < this.outputSize; i++) {
                    for (let j = 0; j < this.hiddenSize; j++) {
                        output[i] += this.weights2[i][j] * hidden[j];
                    }
                    output[i] += this.bias2[i];
                }

                return output;
            }

            mutate(rate = 0.1) {
                for (let i = 0; i < this.hiddenSize; i++) {
                    for (let j = 0; j < this.inputSize; j++) {
                        if (Math.random() < rate) {
                            this.weights1[i][j] += (Math.random() * 2 - 1) * 0.5;
                        }
                    }
                    if (Math.random() < rate) {
                        this.bias1[i] += (Math.random() * 2 - 1) * 0.5;
                    }
                }

                for (let i = 0; i < this.outputSize; i++) {
                    for (let j = 0; j < this.hiddenSize; j++) {
                        if (Math.random() < rate) {
                            this.weights2[i][j] += (Math.random() * 2 - 1) * 0.5;
                        }
                    }
                    if (Math.random() < rate) {
                        this.bias2[i] += (Math.random() * 2 - 1) * 0.5;
                    }
                }
            }

            clone() {
                const nn = new NeuralNetwork(this.inputSize, this.hiddenSize, this.outputSize);
                nn.weights1 = JSON.parse(JSON.stringify(this.weights1));
                nn.weights2 = JSON.parse(JSON.stringify(this.weights2));
                nn.bias1 = [...this.bias1];
                nn.bias2 = [...this.bias2];
                nn.fitness = this.fitness;
                nn.generation = this.generation;
                nn.bestFitness = this.bestFitness;
                return nn;
            }

            toJSON() {
                return {
                    inputSize: this.inputSize,
                    hiddenSize: this.hiddenSize,
                    outputSize: this.outputSize,
                    weights1: this.weights1,
                    weights2: this.weights2,
                    bias1: this.bias1,
                    bias2: this.bias2,
                    fitness: this.fitness,
                    generation: this.generation,
                    bestFitness: this.bestFitness
                };
            }

            static fromJSON(data) {
                const nn = new NeuralNetwork(data.inputSize, data.hiddenSize, data.outputSize);
                nn.weights1 = data.weights1;
                nn.weights2 = data.weights2;
                nn.bias1 = data.bias1;
                nn.bias2 = data.bias2;
                nn.fitness = data.fitness;
                nn.generation = data.generation;
                nn.bestFitness = data.bestFitness;
                return nn;
            }
        }

        // Main Game Component
        function Game() {
            // Game state
            const [resources, setResources] = React.useState({
                gold: 100,
                food: 100,
                wood: 50,
                stone: 25,
                iron: 10,
                population: 20,
                happiness: 100
            });

            const [buildings, setBuildings] = React.useState({
                farm: 1,
                lumberMill: 0,
                quarry: 0,
                mine: 0,
                barracks: 0,
                castle: 1,
                market: 0,
                academy: 0
            });

            const [army, setArmy] = React.useState({
                knights: 0,
                archers: 0,
                infantry: 0,
                siege: 0
            });

            const [upgrades, setUpgrades] = React.useState({
                farming: 1,
                logging: 1,
                mining: 1,
                combat: 1,
                economy: 1
            });

            const [world, setWorld] = React.useState({
                level: 1,
                difficulty: 1,
                territoriesControlled: 1,
                enemiesDefeated: 0
            });

            const [activeTab, setActiveTab] = React.useState('overview');
            const [activeSubTab, setActiveSubTab] = React.useState('resources');
            const [showOfflinePopup, setShowOfflinePopup] = React.useState(false);
            const [offlineProgress, setOfflineProgress] = React.useState(null);
            const [combatState, setCombatState] = React.useState(null);
            const [combatLog, setCombatLog] = React.useState([]);
            const [neuralNetwork, setNeuralNetwork] = React.useState(null);
            const [nnStats, setNnStats] = React.useState({
                decisions: 0,
                avgFitness: 0,
                currentGeneration: 1,
                bestScore: 0
            });

            const [lastSaveTime, setLastSaveTime] = React.useState(Date.now());
            const [lastNNSaveTime, setLastNNSaveTime] = React.useState(Date.now());

            // Production rates
            const getProductionRates = () => ({
                gold: (buildings.market * 5 + buildings.castle * 10) * upgrades.economy,
                food: (buildings.farm * 10) * upgrades.farming,
                wood: (buildings.lumberMill * 8) * upgrades.logging,
                stone: (buildings.quarry * 5) * upgrades.mining,
                iron: (buildings.mine * 3) * upgrades.mining,
                population: Math.floor(buildings.farm * 0.5),
                happiness: 0.1
            });

            // Building costs
            const getBuildingCost = (building) => {
                const baseCosts = {
                    farm: { gold: 50, wood: 20 },
                    lumberMill: { gold: 100, wood: 50 },
                    quarry: { gold: 150, wood: 50, stone: 25 },
                    mine: { gold: 200, wood: 100, stone: 50 },
                    barracks: { gold: 300, wood: 150, stone: 100 },
                    castle: { gold: 1000, wood: 500, stone: 500, iron: 100 },
                    market: { gold: 250, wood: 100 },
                    academy: { gold: 500, wood: 200, stone: 100 }
                };
                const multiplier = Math.pow(1.5, buildings[building]);
                const costs = baseCosts[building];
                const scaled = {};
                for (let resource in costs) {
                    scaled[resource] = costs[resource] * multiplier;
                }
                return scaled;
            };

            // Unit costs
            const getUnitCost = (unit) => {
                const costs = {
                    infantry: { gold: 50, food: 30 },
                    archer: { gold: 75, food: 40, wood: 20 },
                    knight: { gold: 150, food: 60, iron: 10 },
                    siege: { gold: 300, food: 100, wood: 150, iron: 50 }
                };
                const multiplier = Math.pow(1.3, army[unit] || 0);
                const unitCosts = costs[unit];
                const scaled = {};
                for (let resource in unitCosts) {
                    scaled[resource] = unitCosts[resource] * multiplier;
                }
                return scaled;
            };

            // Check if can afford
            const canAfford = (costs) => {
                for (let resource in costs) {
                    if (resources[resource] < costs[resource]) return false;
                }
                return true;
            };

            // Purchase building
            const buyBuilding = (building) => {
                const costs = getBuildingCost(building);
                if (!canAfford(costs)) return;

                const newResources = { ...resources };
                for (let resource in costs) {
                    newResources[resource] -= costs[resource];
                }
                setResources(newResources);
                setBuildings(prev => ({
                    ...prev,
                    [building]: prev[building] + 1
                }));
            };

            // Recruit unit
            const recruitUnit = (unit) => {
                const costs = getUnitCost(unit);
                if (!canAfford(costs)) return;

                const newResources = { ...resources };
                for (let resource in costs) {
                    newResources[resource] -= costs[resource];
                }
                setResources(newResources);
                setArmy(prev => ({
                    ...prev,
                    [unit]: (prev[unit] || 0) + 1
                }));
            };

            // Buy upgrade
            const buyUpgrade = (upgrade) => {
                const cost = Math.pow(100, upgrades[upgrade]);
                if (resources.gold < cost) return;

                setResources(prev => ({
                    ...prev,
                    gold: prev.gold - cost
                }));
                setUpgrades(prev => ({
                    ...prev,
                    [upgrade]: prev[upgrade] + 1
                }));
            };

            // Start combat
            const startCombat = () => {
                const enemyStrength = world.difficulty * 100 * Math.pow(1.5, world.level - 1);
                const playerStrength = (
                    army.infantry * 10 +
                    army.archers * 15 +
                    army.knights * 30 +
                    army.siege * 50
                ) * upgrades.combat;

                const battleDuration = 5000; // 5 seconds
                setCombatState({
                    active: true,
                    playerStrength,
                    enemyStrength,
                    progress: 0,
                    startTime: Date.now()
                });
                setCombatLog([{
                    time: new Date().toLocaleTimeString(),
                    message: `Battle started! Enemy strength: ${formatNumber(enemyStrength)}, Your strength: ${formatNumber(playerStrength)}`
                }]);
            };

            // Combat resolution
            React.useEffect(() => {
                if (!combatState || !combatState.active) return;

                const interval = setInterval(() => {
                    const elapsed = Date.now() - combatState.startTime;
                    const progress = Math.min(elapsed / 5000, 1);

                    setCombatState(prev => ({
                        ...prev,
                        progress
                    }));

                    if (progress >= 1) {
                        const won = combatState.playerStrength >= combatState.enemyStrength;
                        
                        if (won) {
                            const goldReward = world.difficulty * 500 * Math.pow(1.5, world.level - 1);
                            const xpReward = world.difficulty * 100;
                            
                            setResources(prev => ({
                                ...prev,
                                gold: prev.gold + goldReward
                            }));
                            setWorld(prev => ({
                                ...prev,
                                enemiesDefeated: prev.enemiesDefeated + 1,
                                level: prev.level + 1,
                                difficulty: prev.difficulty + 0.5
                            }));
                            
                            setCombatLog(prev => [{
                                time: new Date().toLocaleTimeString(),
                                message: `Victory! Gained ${formatNumber(goldReward)} gold. World level increased to ${world.level + 1}!`
                            }, ...prev.slice(0, 49)]);
                        } else {
                            const lossPercent = 0.1;
                            setArmy(prev => ({
                                infantry: Math.floor(prev.infantry * (1 - lossPercent)),
                                archers: Math.floor(prev.archers * (1 - lossPercent)),
                                knights: Math.floor(prev.knights * (1 - lossPercent)),
                                siege: Math.floor(prev.siege * (1 - lossPercent))
                            }));
                            
                            setCombatLog(prev => [{
                                time: new Date().toLocaleTimeString(),
                                message: `Defeat! Lost ${Math.floor(lossPercent * 100)}% of your army. Retreat and rebuild!`
                            }, ...prev.slice(0, 49)]);
                        }

                        setCombatState(null);
                    }
                }, 100);

                return () => clearInterval(interval);
            }, [combatState]);

            // Neural Network AI
            React.useEffect(() => {
                // Initialize neural network
                const inputSize = 10; // resources + army counts
                const hiddenSize = 20;
                const outputSize = 8; // actions: buy buildings, recruit units, upgrade, attack

                let nn = NeuralNetwork.fromJSON(JSON.parse(localStorage.getItem('lords_nn') || '{}'));
                if (!nn || nn.inputSize !== inputSize) {
                    nn = new NeuralNetwork(inputSize, hiddenSize, outputSize);
                }
                setNeuralNetwork(nn);

                // Population for evolution
                const populationSize = 10;
                let population = [nn.clone()];
                for (let i = 1; i < populationSize; i++) {
                    const mutant = nn.clone();
                    mutant.mutate(0.3);
                    population.push(mutant);
                }

                let nnInterval = setInterval(() => {
                    // Get current game state as input
                    const input = [
                        resources.gold / 1000,
                        resources.food / 1000,
                        resources.wood / 1000,
                        resources.stone / 1000,
                        resources.iron / 1000,
                        army.infantry / 10,
                        army.archers / 10,
                        army.knights / 10,
                        world.level / 10,
                        resources.happiness / 100
                    ];

                    // Select best network from population
                    let bestNet = population[0];
                    let bestScore = 0;

                    population.forEach(net => {
                        const output = net.forward(input);
                        const actionIndex = output.indexOf(Math.max(...output));
                        
                        // Simulate action and score it
                        let score = 0;
                        switch(actionIndex) {
                            case 0: // Buy farm
                                if (canAfford(getBuildingCost('farm'))) score = 10;
                                break;
                            case 1: // Buy lumber mill
                                if (canAfford(getBuildingCost('lumberMill'))) score = 10;
                                break;
                            case 2: // Recruit infantry
                                if (canAfford(getUnitCost('infantry'))) score = 15;
                                break;
                            case 3: // Recruit archer
                                if (canAfford(getUnitCost('archer'))) score = 15;
                                break;
                            case 4: // Recruit knight
                                if (canAfford(getUnitCost('knight'))) score = 20;
                                break;
                            case 5: // Upgrade farming
                                if (resources.gold >= Math.pow(100, upgrades.farming)) score = 25;
                                break;
                            case 6: // Attack
                                if (!combatState && army.infantry + army.archers + army.knights > 10) score = 30;
                                break;
                            default:
                                score = 1;
                        }

                        // Reward for resource growth
                        score += (resources.gold + resources.food) / 1000;
                        
                        // Reward for army size
                        score += (army.infantry + army.archers + army.knights) * 0.1;

                        net.fitness = score;
                        if (score > bestScore) {
                            bestScore = score;
                            bestNet = net;
                        }
                    });

                    // Evolution: keep best, mutate others
                    const newPopulation = [bestNet.clone()];
                    for (let i = 1; i < populationSize; i++) {
                        const mutant = bestNet.clone();
                        mutant.mutate(0.2);
                        mutant.generation = bestNet.generation + 1;
                        newPopulation.push(mutant);
                    }
                    population = newPopulation;

                    // Execute best action
                    const output = bestNet.forward(input);
                    const actionIndex = output.indexOf(Math.max(...output));
                    
                    switch(actionIndex) {
                        case 0:
                            if (canAfford(getBuildingCost('farm'))) buyBuilding('farm');
                            break;
                        case 1:
                            if (canAfford(getBuildingCost('lumberMill'))) buyBuilding('lumberMill');
                            break;
                        case 2:
                            if (canAfford(getUnitCost('infantry'))) recruitUnit('infantry');
                            break;
                        case 3:
                            if (canAfford(getUnitCost('archer'))) recruitUnit('archer');
                            break;
                        case 4:
                            if (canAfford(getUnitCost('knight'))) recruitUnit('knight');
                            break;
                        case 5:
                            if (resources.gold >= Math.pow(100, upgrades.farming)) buyUpgrade('farming');
                            break;
                        case 6:
                            if (!combatState && army.infantry + army.archers + army.knights > 10) startCombat();
                            break;
                    }

                    setNnStats({
                        decisions: nnStats.decisions + 1,
                        avgFitness: population.reduce((sum, net) => sum + net.fitness, 0) / populationSize,
                        currentGeneration: bestNet.generation,
                        bestScore: Math.max(nnStats.bestScore, bestScore)
                    });

                    setNeuralNetwork(bestNet);
                }, 1000); // AI makes decision every second

                return () => clearInterval(nnInterval);
            }, [resources, army, world, combatState, upgrades]);

            // Auto-save game every second
            React.useEffect(() => {
                const saveInterval = setInterval(() => {
                    const gameState = {
                        resources,
                        buildings,
                        army,
                        upgrades,
                        world,
                        lastSaveTime: Date.now()
                    };
                    localStorage.setItem('lords_game_save', JSON.stringify(gameState));
                    setLastSaveTime(Date.now());
                }, 1000);

                return () => clearInterval(saveInterval);
            }, [resources, buildings, army, upgrades, world]);

            // Auto-save neural network every 5 seconds
            React.useEffect(() => {
                const nnSaveInterval = setInterval(() => {
                    if (neuralNetwork) {
                        localStorage.setItem('lords_nn', JSON.stringify(neuralNetwork.toJSON()));
                        setLastNNSaveTime(Date.now());
                    }
                }, 5000);

                return () => clearInterval(nnSaveInterval);
            }, [neuralNetwork]);

            // Load game and calculate offline progress
            React.useEffect(() => {
                const savedGame = localStorage.getItem('lords_game_save');
                if (savedGame) {
                    const gameState = JSON.parse(savedGame);
                    const now = Date.now();
                    const offlineSeconds = (now - gameState.lastSaveTime) / 1000;

                    if (offlineSeconds > 10) {
                        // Calculate offline production
                        const rates = {
                            gold: (gameState.buildings.market * 5 + gameState.buildings.castle * 10) * gameState.upgrades.economy,
                            food: (gameState.buildings.farm * 10) * gameState.upgrades.farming,
                            wood: (gameState.buildings.lumberMill * 8) * gameState.upgrades.logging,
                            stone: (gameState.buildings.quarry * 5) * gameState.upgrades.mining,
                            iron: (gameState.buildings.mine * 3) * gameState.upgrades.mining
                        };

                        const offlineGains = {};
                        for (let resource in rates) {
                            offlineGains[resource] = rates[resource] * offlineSeconds * 0.5; // 50% efficiency offline
                        }

                        setOfflineProgress({
                            seconds: offlineSeconds,
                            gains: offlineGains
                        });
                        setShowOfflinePopup(true);

                        // Apply offline gains
                        setResources(prev => ({
                            ...prev,
                            ...gameState.resources,
                            gold: gameState.resources.gold + offlineGains.gold,
                            food: gameState.resources.food + offlineGains.food,
                            wood: gameState.resources.wood + offlineGains.wood,
                            stone: gameState.resources.stone + offlineGains.stone,
                            iron: gameState.resources.iron + offlineGains.iron
                        }));
                    } else {
                        setResources(gameState.resources);
                    }
                    setBuildings(gameState.buildings);
                    setArmy(gameState.army);
                    setUpgrades(gameState.upgrades);
                    setWorld(gameState.world);
                }
            }, []);

            // Game tick (production)
            React.useEffect(() => {
                const tickInterval = setInterval(() => {
                    const rates = getProductionRates();
                    setResources(prev => ({
                        ...prev,
                        gold: prev.gold + rates.gold,
                        food: prev.food + rates.food,
                        wood: prev.wood + rates.wood,
                        stone: prev.stone + rates.stone,
                        iron: prev.iron + rates.iron,
                        population: Math.min(prev.population + rates.population, buildings.farm * 10),
                        happiness: Math.min(100, Math.max(0, prev.happiness + rates.happiness))
                    }));
                }, 1000);

                return () => clearInterval(tickInterval);
            }, [buildings, upgrades]);

            const dismissOfflinePopup = () => {
                setShowOfflinePopup(false);
                setOfflineProgress(null);
            };

            // Render functions for different tabs
            const renderOverview = () => (
                <div>
                    <div className="world-info">
                        <h3>World Status</h3>
                        <p>Level: {world.level} | Difficulty: {world.difficulty.toFixed(1)} | Territories: {world.territoriesControlled} | Enemies Defeated: {world.enemiesDefeated}</p>
                    </div>

                    <h3>Resources</h3>
                    <div className="resource-grid">
                        {Object.entries(resources).map(([name, amount]) => (
                            <div key={name} className="resource-card">
                                <div className="resource-name">{name.charAt(0).toUpperCase() + name.slice(1)}</div>
                                <div className="resource-amount">{formatNumber(amount)}</div>
                                {getProductionRates()[name] > 0 && (
                                    <div className="resource-rate">+{formatNumber(getProductionRates()[name])}/s</div>
                                )}
                            </div>
                        ))}
                    </div>

                    <h3>Army</h3>
                    <div style={{ marginBottom: '20px' }}>
                        {Object.entries(army).map(([unit, count]) => (
                            <div key={unit} className="army-unit">
                                <strong>{unit.charAt(0).toUpperCase() + unit.slice(1)}:</strong> {formatNumber(count)}
                            </div>
                        ))}
                    </div>

                    {combatState && (
                        <div style={{ marginTop: '20px' }}>
                            <h3>Combat in Progress</h3>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${combatState.progress * 100}%` }}></div>
                            </div>
                            <p>Player: {formatNumber(combatState.playerStrength)} vs Enemy: {formatNumber(combatState.enemyStrength)}</p>
                        </div>
                    )}
                </div>
            );

            const renderBuildings = () => (
                <div>
                    <h3>Construct Buildings</h3>
                    <div className="resource-grid">
                        {Object.keys(buildings).map(building => {
                            const costs = getBuildingCost(building);
                            const affordable = canAfford(costs);
                            return (
                                <div key={building} className="resource-card">
                                    <div className="resource-name">{building.replace(/([A-Z])/g, ' $1').trim()}</div>
                                    <div className="resource-amount">Level: {buildings[building]}</div>
                                    <div style={{ fontSize: '0.8em', margin: '10px 0' }}>
                                        Cost: {Object.entries(costs).map(([res, amt]) => 
                                            `${formatNumber(amt)} ${res}`
                                        ).join(', ')}
                                    </div>
                                    <button 
                                        className="btn" 
                                        onClick={() => buyBuilding(building)}
                                        disabled={!affordable}
                                    >
                                        Build
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderMilitary = () => (
                <div>
                    <h3>Recruit Units</h3>
                    <div className="resource-grid">
                        {['infantry', 'archer', 'knight', 'siege'].map(unit => {
                            const costs = getUnitCost(unit);
                            const affordable = canAfford(costs);
                            return (
                                <div key={unit} className="resource-card">
                                    <div className="resource-name">{unit.charAt(0).toUpperCase() + unit.slice(1)}</div>
                                    <div className="resource-amount">Count: {formatNumber(army[unit] || 0)}</div>
                                    <div style={{ fontSize: '0.8em', margin: '10px 0' }}>
                                        Cost: {Object.entries(costs).map(([res, amt]) => 
                                            `${formatNumber(amt)} ${res}`
                                        ).join(', ')}
                                    </div>
                                    <button 
                                        className="btn" 
                                        onClick={() => recruitUnit(unit)}
                                        disabled={!affordable}
                                    >
                                        Recruit
                                    </button>
                                </div>
                            );
                        })}
                    </div>

                    <h3 style={{ marginTop: '30px' }}>Engage in Combat</h3>
                    <button 
                        className="btn" 
                        onClick={startCombat}
                        disabled={combatState !== null || (army.infantry + army.archers + army.knights + army.siege === 0)}
                        style={{ padding: '15px 30px', fontSize: '1.2em' }}
                    >
                        {combatState ? 'Battle in Progress...' : 'Attack Enemy'}
                    </button>

                    {combatLog.length > 0 && (
                        <div className="combat-log">
                            <h4>Battle Log</h4>
                            {combatLog.map((entry, index) => (
                                <div key={index} className="log-entry">
                                    <small>{entry.time}</small>: {entry.message}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderUpgrades = () => (
                <div>
                    <h3>Research Upgrades</h3>
                    <div className="resource-grid">
                        {Object.keys(upgrades).map(upgrade => {
                            const cost = Math.pow(100, upgrades[upgrade]);
                            const affordable = resources.gold >= cost;
                            return (
                                <div key={upgrade} className="resource-card">
                                    <div className="resource-name">{upgrade.charAt(0).toUpperCase() + upgrade.slice(1)}</div>
                                    <div className="resource-amount">Level: {upgrades[upgrade]}</div>
                                    <div style={{ fontSize: '0.8em', margin: '10px 0' }}>
                                        Cost: {formatNumber(cost)} gold
                                    </div>
                                    <button 
                                        className="btn" 
                                        onClick={() => buyUpgrade(upgrade)}
                                        disabled={!affordable}
                                    >
                                        Research
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderNeuralNet = () => (
                <div>
                    <h3>Neural Network AI</h3>
                    <p>The AI is learning to play the game optimally. It evolves over time to maximize resource gain and military strength.</p>
                    
                    <div className="neural-stats">
                        <div className="stat-box">
                            <div>Total Decisions</div>
                            <div style={{ fontSize: '1.5em', fontWeight: 'bold' }}>{formatNumber(nnStats.decisions)}</div>
                        </div>
                        <div className="stat-box">
                            <div>Average Fitness</div>
                            <div style={{ fontSize: '1.5em', fontWeight: 'bold' }}>{formatNumber(nnStats.avgFitness)}</div>
                        </div>
                        <div className="stat-box">
                            <div>Generation</div>
                            <div style={{ fontSize: '1.5em', fontWeight: 'bold' }}>{formatNumber(nnStats.currentGeneration)}</div>
                        </div>
                        <div className="stat-box">
                            <div>Best Score</div>
                            <div style={{ fontSize: '1.5em', fontWeight: 'bold' }}>{formatNumber(nnStats.bestScore)}</div>
                        </div>
                    </div>

                    {neuralNetwork && (
                        <div style={{ marginTop: '20px' }}>
                            <h4>Network Architecture</h4>
                            <p>Input Layer: {neuralNetwork.inputSize} neurons (resources, army, world state)</p>
                            <p>Hidden Layer: {neuralNetwork.hiddenSize} neurons</p>
                            <p>Output Layer: {neuralNetwork.outputSize} neurons (actions)</p>
                            <p>Last Saved: {new Date(lastNNSaveTime).toLocaleTimeString()}</p>
                        </div>
                    )}

                    <div style={{ marginTop: '20px', padding: '15px', background: 'rgba(0,0,0,0.3)', borderRadius: '8px' }}>
                        <h4>AI Actions Available:</h4>
                        <ul style={{ marginLeft: '20px', marginTop: '10px' }}>
                            <li>Build Farms & Lumber Mills</li>
                            <li>Recruit Infantry, Archers, Knights</li>
                            <li>Research Upgrades</li>
                            <li>Initiate Combat</li>
                        </ul>
                        <p style={{ marginTop: '10px', color: '#ffd700' }}>
                            The AI automatically makes decisions every second based on current game state!
                        </p>
                    </div>
                </div>
            );

            const renderSettings = () => (
                <div>
                    <h3>Game Settings</h3>
                    <div style={{ marginTop: '20px' }}>
                        <p><strong>Last Auto-Save:</strong> {new Date(lastSaveTime).toLocaleTimeString()}</p>
                        <p><strong>Neural Network Last Saved:</strong> {new Date(lastNNSaveTime).toLocaleTimeString()}</p>
                        
                        <button 
                            className="btn" 
                            onClick={() => {
                                localStorage.removeItem('lords_game_save');
                                localStorage.removeItem('lords_nn');
                                window.location.reload();
                            }}
                            style={{ marginTop: '20px', background: '#8b0000' }}
                        >
                            Reset Game (Hard Reset)
                        </button>
                    </div>

                    <div style={{ marginTop: '30px' }}>
                        <h4>How to Play</h4>
                        <ul style={{ marginLeft: '20px', marginTop: '10px', lineHeight: '1.8' }}>
                            <li>Build resource-generating buildings to accumulate wealth</li>
                            <li>Recruit armies to conquer enemies</li>
                            <li>Research upgrades to boost production and combat power</li>
                            <li>Engage in combat to progress through world levels</li>
                            <li>The Neural Network AI learns and plays automatically</li>
                            <li>Game saves every second, AI saves every 5 seconds</li>
                            <li>No game over - infinite progression with scaling difficulty</li>
                            <li>Numbers scale infinitely with suffixes (K, M, B, T, Qa, etc.)</li>
                        </ul>
                    </div>
                </div>
            );

            const tabs = [
                { id: 'overview', label: 'Overview' },
                { id: 'buildings', label: 'Buildings' },
                { id: 'military', label: 'Military' },
                { id: 'upgrades', label: 'Upgrades' },
                { id: 'neuralnet', label: 'Neural AI' },
                { id: 'settings', label: 'Settings' }
            ];

            return (
                <div className="game-container">
                    <div className="header">
                        <h1>⚔️ Lords of the Realm II ⚔️</h1>
                        <p>Infinite Progression • Neural AI • Offline Progress</p>
                    </div>

                    <div className="tabs">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                className={`tab-button ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="content">
                        {activeTab === 'overview' && renderOverview()}
                        {activeTab === 'buildings' && renderBuildings()}
                        {activeTab === 'military' && renderMilitary()}
                        {activeTab === 'upgrades' && renderUpgrades()}
                        {activeTab === 'neuralnet' && renderNeuralNet()}
                        {activeTab === 'settings' && renderSettings()}
                    </div>

                    {showOfflinePopup && offlineProgress && (
                        <div className="popup">
                            <h2>🏰 Welcome Back, Lord! 🏰</h2>
                            <div className="popup-content">
                                <p>You were away for <strong>{formatNumber(offlineProgress.seconds)}</strong> seconds.</p>
                                <p>Your realm continued to produce resources:</p>
                                <div style={{ marginTop: '15px', textAlign: 'left' }}>
                                    {Object.entries(offlineProgress.gains).map(([resource, gain]) => (
                                        <div key={resource}>
                                            <strong>+{formatNumber(gain)} {resource}</strong>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button className="btn" onClick={dismissOfflinePopup}>
                                Continue Ruling
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // Render the game
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Game />);
    </script>
</body>
</html>
